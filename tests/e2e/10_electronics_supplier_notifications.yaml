appId: com.example.digitalgoods
name: 10_electronics_supplier_notifications
---
# Flow 10: Log in with Humaira's Electronics Supplier account and verify dashboard + notifications.
- launchApp:
    clearState: true
    permissions:
      notifications: allow
      camera: allow

- runFlow:
    when:
      visible: ".*isn't responding"
    commands:
      - tapOn: "Wait"
- extendedWaitUntil:
    visible: "Secure Ownership"
    timeout: 60000
- swipe:
    direction: LEFT
- extendedWaitUntil:
    visible: "QR Verification"
    timeout: 15000
- swipe:
    direction: LEFT
- extendedWaitUntil:
    visible: "Future Tokenization"
    timeout: 15000
- tapOn: "Get Started"
- extendedWaitUntil:
    visible: "Welcome Back!"
    timeout: 20000
- tapOn: "Email Address"
- inputText: ${ELECTRONICS_EMAIL}
- tapOn: "Password"
- inputText: ${ELECTRONICS_PASSWORD}
- hideKeyboard
- tapOn: "Sign In"
# Role title can wrap; My Assets confirms the supplier dashboard loaded.
- extendedWaitUntil:
    visible: ".*My Assets.*"
    timeout: 45000
- assertVisible: ".*Add Asset.*"
- takeScreenshot: "screenshots/10_01_electronics_supplier_dashboard"
# Bell icon is the far-right app bar action after the wallet icon.
- tapOn:
    point: "94%,7%"
- extendedWaitUntil:
    visible: "Notifications"
    timeout: 15000
- assertVisible: "Notifications"
- takeScreenshot: "screenshots/10_02_electronics_supplier_notifications"
