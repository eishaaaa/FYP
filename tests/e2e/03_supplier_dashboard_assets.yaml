appId: com.example.digitalgoods
name: 03_supplier_dashboard_assets
---
# Flow 3: Verify supplier dashboard and existing asset actions.
- launchApp:
    clearState: true
    permissions:
      notifications: allow
      camera: allow

# Android emulator can occasionally show a System UI / Pixel Launcher ANR dialog.
# Dismiss it before assertions so Maestro can see the Flutter app.
- runFlow:
    when:
      visible: ".*isn't responding"
    commands:
      - tapOn: "Wait"
- extendedWaitUntil:
    visible: "Secure Ownership"
    timeout: 60000
- swipe:
    direction: LEFT
- extendedWaitUntil:
    visible: "QR Verification"
    timeout: 15000
- swipe:
    direction: LEFT
- extendedWaitUntil:
    visible: "Future Tokenization"
    timeout: 15000
- tapOn: "Get Started"
- extendedWaitUntil:
    visible: "Welcome Back!"
    timeout: 20000
- tapOn: "Email Address"
- inputText: ${SUPPLIER_EMAIL}
- tapOn: "Password"
- inputText: ${SUPPLIER_PASSWORD}
- hideKeyboard
- tapOn: "Sign In"
- extendedWaitUntil:
    visible: ".*Land Supplier.*"
    timeout: 45000
- assertVisible: ".*My Assets.*"
- assertVisible: ".*NFT Minted.*"
- assertVisible: ".*Distribute Rent.*"
- assertVisible: "QR Code"
- assertVisible: "Edit"
- assertVisible: ".*Add Asset.*"
- takeScreenshot: "screenshots/03_01_supplier_assets"
