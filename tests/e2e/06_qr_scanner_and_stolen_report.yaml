appId: com.example.digitalgoods
name: 06_qr_scanner_and_stolen_report
---
# Flow 6: Verify QR scanner navigation and stolen report form from supplier profile.
- launchApp:
    clearState: true
    permissions:
      notifications: allow
      camera: allow

- runFlow:
    when:
      visible: ".*isn't responding"
    commands:
      - tapOn: "Wait"
- extendedWaitUntil:
    visible: "Secure Ownership"
    timeout: 60000
- swipe:
    direction: LEFT
- extendedWaitUntil:
    visible: "QR Verification"
    timeout: 15000
- swipe:
    direction: LEFT
- extendedWaitUntil:
    visible: "Future Tokenization"
    timeout: 15000
- tapOn: "Get Started"
- extendedWaitUntil:
    visible: "Welcome Back!"
    timeout: 20000
- tapOn: "Email Address"
- inputText: ${SUPPLIER_EMAIL}
- tapOn: "Password"
- inputText: ${SUPPLIER_PASSWORD}
- hideKeyboard
- tapOn: "Sign In"
- extendedWaitUntil:
    visible: ".*My Assets.*"
    timeout: 45000
# Bottom Scan tab is point-tapped to avoid label exposure differences on Flutter BottomNavigationBar.
- tapOn:
    point: "38%,94%"
- extendedWaitUntil:
    visible: "Align QR Code"
    timeout: 15000
- takeScreenshot: "screenshots/06_01_qr_scanner"
- back
- tapOn:
    point: "87%,94%"
- extendedWaitUntil:
    visible: "Stolen Reports"
    timeout: 15000
- tapOn: "Stolen Reports"
- extendedWaitUntil:
    visible: "Stolen Report"
    timeout: 15000
- takeScreenshot: "screenshots/06_02_stolen_report_tabs"
# Submit New is the third tab; tap the tab area directly because tab labels can be hidden from hierarchy.
- tapOn:
    point: "81%,15%"
- extendedWaitUntil:
    visible: "Select Stolen Device"
    timeout: 15000
- assertVisible: "Incident Description"
- assertVisible: "Police Complaint Document"
- assertVisible: "Submit Stolen Report"
- takeScreenshot: "screenshots/06_03_stolen_report_form"
