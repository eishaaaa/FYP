appId: com.example.digitalgoods
name: 07_supplier_notifications
---
# Flow 7: Verify supplier notification entry point and notification screen.
- launchApp:
    clearState: true
    permissions:
      notifications: allow
      camera: allow

- runFlow:
    when:
      visible: ".*isn't responding"
    commands:
      - tapOn: "Wait"
- extendedWaitUntil:
    visible: "Secure Ownership"
    timeout: 60000
- swipe:
    direction: LEFT
- extendedWaitUntil:
    visible: "QR Verification"
    timeout: 15000
- swipe:
    direction: LEFT
- extendedWaitUntil:
    visible: "Future Tokenization"
    timeout: 15000
- tapOn: "Get Started"
- extendedWaitUntil:
    visible: "Welcome Back!"
    timeout: 20000
- tapOn: "Email Address"
- inputText: ${SUPPLIER_EMAIL}
- tapOn: "Password"
- inputText: ${SUPPLIER_PASSWORD}
- hideKeyboard
- tapOn: "Sign In"
- extendedWaitUntil:
    visible: ".*Land Supplier.*"
    timeout: 45000
# Bell icon is the far-right app bar action after the wallet icon.
- tapOn:
    point: "94%,7%"
- extendedWaitUntil:
    visible: "Notifications"
    timeout: 15000
- assertVisible: "Notifications"
- takeScreenshot: "screenshots/07_01_supplier_notifications"
