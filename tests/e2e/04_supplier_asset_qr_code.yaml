appId: com.example.digitalgoods
name: 04_supplier_asset_qr_code
---
# Flow 4: Open QR code for a supplier asset and verify QR export actions.
- launchApp:
    clearState: true
    permissions:
      notifications: allow
      camera: allow

- runFlow:
    when:
      visible: ".*isn't responding"
    commands:
      - tapOn: "Wait"
- extendedWaitUntil:
    visible: "Secure Ownership"
    timeout: 60000
- swipe:
    direction: LEFT
- extendedWaitUntil:
    visible: "QR Verification"
    timeout: 15000
- swipe:
    direction: LEFT
- extendedWaitUntil:
    visible: "Future Tokenization"
    timeout: 15000
- tapOn: "Get Started"
- extendedWaitUntil:
    visible: "Welcome Back!"
    timeout: 20000
- tapOn: "Email Address"
- inputText: ${SUPPLIER_EMAIL}
- tapOn: "Password"
- inputText: ${SUPPLIER_PASSWORD}
- hideKeyboard
- tapOn: "Sign In"
- extendedWaitUntil:
    visible: ".*My Assets.*"
    timeout: 45000
- takeScreenshot: "screenshots/04_00_supplier_dashboard_before_qr"
# The QR button can be visually visible but not always exposed as text. Tap first-card QR button area.
- tapOn: "QR Code"
- extendedWaitUntil:
    visible: "Asset QR Code"
    timeout: 15000
- assertVisible: "QR Code Data:"
- assertVisible: "Share QR Code"
- assertVisible: "Download QR Code"
- takeScreenshot: "screenshots/04_01_asset_qr_code"
