# Faster builds (safe values)
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=2G -XX:+UseParallelGC -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=true
org.gradle.daemon=true
org.gradle.configureondemand=true

# AndroidX
android.useAndroidX=true
android.enableJetifier=true

# Fix Kotlin incremental cache corruption
kotlin.incremental=false

# Modern Kotlin settings
kotlin.code.style=official

# Prevent Windows AGP cache corruption
android.enableBuildCache=false

# 🔥 Force ALL plugins to use Java 17
kotlin.compiler.jvmTarget=17
java.sourceCompatibility=17
java.targetCompatibility=17

# 🔥 Fix obsolete Java 8 toolchain used by some plugins
kotlin.jvm.target.validation.mode=IGNORE

# 🔥 Recommended for Flutter AGP 8.4+
android.nonTransitiveRClass=true
android.overridePathCheck=true

org.gradle.jvmargs=-Xmx2048M -Dkotlin.daemon.jvm.options=-Xmx1024M
org.gradle.daemon=true
org.gradle.parallel=false
org.gradle.configureondemand=true
android.useAndroidX=true
android.enableJetifier=false